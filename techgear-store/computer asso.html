<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechGear Store</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
}

nav{
display:flex;
justify-content:space-between;
padding:10px 20px;
background:#222;
color:white;
}

nav button{
background:#ff6600;
border:none;
padding:8px 12px;
color:white;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card button{
background:#007bff;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
margin-top:10px;
}

.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-2px 0 10px rgba(0,0,0,0.3);
padding:20px;
display:none;
overflow:auto;
}

.cart h2{
margin-top:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.checkout{
background:green;
color:white;
border:none;
padding:10px;
width:100%;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>logitech computer assosuries</h1>
</header>

<nav>
<div>Best Accessories Store</div>
<button onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>
</nav>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Gaming Mouse</h3>
<p>$25</p>
<button onclick="addToCart('Gaming Mouse',25)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Mechanical Keyboard</h3>
<p>$60</p>
<button onclick="addToCart('Mechanical Keyboard',60)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>RGB Headset</h3>
<p>$40</p>
<button onclick="addToCart('RGB Headset',40)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>USB Hub</h3>
<p>$15</p>
<button onclick="addToCart('USB Hub',15)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Mouse Pad</h3>
<p>$10</p>
<button onclick="addToCart('Mouse Pad',10)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Webcam HD</h3>
<p>$35</p>
<button onclick="addToCart('Webcam HD',35)">Add to Cart</button>
</div>

</div>

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<h3>Total: $<span id="total">0</span></h3>

<button class="checkout">Checkout</button>

</div>

<script>

let cart=[]
let total=0

function addToCart(name,price){

cart.push({name,price})

total+=price

document.getElementById("cart-count").innerText=cart.length

updateCart()

}

function updateCart(){

let items=document.getElementById("cart-items")

items.innerHTML=""

cart.forEach(item=>{

let div=document.createElement("div")

div.className="cart-item"

div.innerHTML=`${item.name} <span>$${item.price}</span>`

items.appendChild(div)

})

document.getElementById("total").innerText=total

}

function toggleCart(){

let cartBox=document.getElementById("cart")

if(cartBox.style.display=="block")

cartBox.style.display="none"

else

cartBox.style.display="block"

}

</script>

</body>
</html>
